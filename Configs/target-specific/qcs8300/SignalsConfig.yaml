      - {ResCode: "0x00040001", ResInfo: "0x00000000", Values: [1958400]}
      - {ResCode: "0x00040000", ResInfo: "0x00000100", Values: [2112000]}
      - {ResCode: "0x00040001", ResInfo: "0x00000100", Values: [2112000]}
      - {ResCode: "0x00040000", ResInfo: "0x00000200", Values: [2361600]}
      - {ResCode: "0x00040001", ResInfo: "0x00000200", Values: [2361600]}
