  # camera open tunings
  # CPU cluster Silver(Little) Min Freq 1958400 KHz, Max Freq 1958400 KHz
  # CPU cluster Gold(Big) Min Freq 2112000 KHz, Max Freq 2112000 KHz
  # CPU cluster Gold_plus(Prime) Min Freq 2361600 KHz, Max Freq 2361600 KHz
  - SigId: "0x1337"
    Category: "0xea"
    Name: "CAMERA_OPEN"
    Enable: true
    TargetsEnabled: ["qcs8300", "qcs8275", "sa7255p"]
    Permissions: ["third_party", "system"]
    Timeout: -1
    Resources:
      - {ResCode: "0x00040000", ResInfo: "0x00000000", Values: [1958400]}
      - {ResCode: "0x00040001", ResInfo: "0x00000000", Values: [1958400]}
      - {ResCode: "0x00040000", ResInfo: "0x00000100", Values: [2112000]}
      - {ResCode: "0x00040001", ResInfo: "0x00000100", Values: [2112000]}
      - {ResCode: "0x00040000", ResInfo: "0x00000200", Values: [2361600]}
      - {ResCode: "0x00040001", ResInfo: "0x00000200", Values: [2361600]}

  # camera close tunings
  # CPU cluster Silver(Little) Min Freq 1958400 KHz, Max Freq 1958400 KHz
  # CPU cluster Gold(Big) Min Freq 2112000 KHz, Max Freq 2112000 KHz
  # CPU cluster Gold_plus(Prime) Min Freq 2361600 KHz, Max Freq 2361600 KHz
  - SigId: "0x1338"
    Category: "0xea"
    Name: "CAMERA_CLOSE"
    Enable: true
    TargetsEnabled: ["qcs8300", "qcs8275", "sa7255p"]
    Permissions: ["third_party", "system"]
    Timeout: -1
    Resources:
